<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logokailexdark.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Kailex - Desarrollo de páginas web modernas, rápidas y accesibles para todo tipo de negocios" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <title>Kailex - Experiencias Digitales Premium</title>

    <!-- Loading Screen Styles -->
    <style>
      #loading-screen {
        position: fixed;
        inset: 0;
        background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #312e81 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 0.6s ease, visibility 0.6s ease;
      }
      #loading-screen.hidden {
        opacity: 0;
        visibility: hidden;
      }
      .loader-content {
        text-align: center;
      }
      .loader-logo {
        width: 180px;
        height: auto;
        animation: pulse 2s ease-in-out infinite;
      }
      @keyframes pulse {
        0%, 100% { transform: scale(1); opacity: 1; }
        50% { transform: scale(1.05); opacity: 0.9; }
      }
      .loader-bar {
        width: 200px;
        height: 3px;
        background: rgba(255, 255, 255, 0.1);
        border-radius: 999px;
        margin: 24px auto 0;
        overflow: hidden;
        position: relative;
      }
      .loader-bar::after {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        height: 100%;
        width: 50%;
        background: linear-gradient(90deg, #6366f1, #a855f7, #ec4899);
        border-radius: 999px;
        animation: loading 1.5s ease-in-out infinite;
      }
      @keyframes loading {
        0% { transform: translateX(-100%); }
        100% { transform: translateX(300%); }
      }
      .loader-text {
        color: rgba(255, 255, 255, 0.6);
        font-family: 'Inter', sans-serif;
        font-size: 14px;
        margin-top: 16px;
        letter-spacing: 2px;
        text-transform: uppercase;
      }
    </style>
  </head>
  <body>
    <!-- Loading Screen -->
    <div id="loading-screen">
      <div class="loader-content">
        <img src="/logokailexlight.png" alt="Kailex" class="loader-logo" />
        <div class="loader-bar"></div>
        <div class="loader-text">Cargando</div>
      </div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
